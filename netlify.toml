[[redirects]]
  from = "/api/sync-drive"
  to = "/.netlify/functions/sync-drive-background"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[functions."sync-drive"]
  included_files = []
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "npm install && npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
